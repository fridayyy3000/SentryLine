<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">SentryLine Architecture</title>
  <desc id="desc">Architecture diagram showing evidence sources, retrieval, SentryLine verifier layer, answer generation, and clinician-facing output.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#101827" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1200" height="430" rx="18" fill="#f6f3ed"/>
  <rect x="24" y="24" width="1152" height="382" rx="14" fill="#fbfaf7" stroke="#d8d2c8" stroke-width="2"/>

  <text x="600" y="67" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#182233">SentryLine Architecture</text>
  <text x="600" y="96" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#697483">Evidence-grounded QA over evolving oncology guideline documents</text>

  <g filter="url(#shadow)">
    <rect x="70" y="148" width="185" height="140" rx="12" fill="#ffffff" stroke="#ded8cf"/>
    <text x="162.5" y="184" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#1f63d3">Evidence Sources</text>
    <text x="162.5" y="214" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#182233">ASCO / NCCN</text>
    <text x="162.5" y="239" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#697483">Breast and prostate</text>
    <text x="162.5" y="261" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#697483">guideline PDFs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="148" width="185" height="140" rx="12" fill="#ffffff" stroke="#ded8cf"/>
    <text x="422.5" y="184" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#1f63d3">Retriever</text>
    <text x="422.5" y="214" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#182233">Guideline passages</text>
    <text x="422.5" y="239" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#697483">Current turn +</text>
    <text x="422.5" y="261" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#697483">conversation context</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="128" width="230" height="180" rx="14" fill="#eef4ff" stroke="#b6caee" stroke-width="2"/>
    <text x="705" y="164" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#174fae">SentryLine Layer</text>
    <rect x="618" y="188" width="174" height="30" rx="15" fill="#ffffff" stroke="#c6d6f3"/>
    <text x="705" y="208" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#182233">Factual verification</text>
    <rect x="618" y="229" width="174" height="30" rx="15" fill="#ffffff" stroke="#c6d6f3"/>
    <text x="705" y="249" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#182233">Temporal drift detection</text>
    <rect x="618" y="270" width="174" height="30" rx="15" fill="#ffffff" stroke="#c6d6f3"/>
    <text x="705" y="290" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#182233">Safety and role fit</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="895" y="148" width="235" height="140" rx="12" fill="#ffffff" stroke="#ded8cf"/>
    <text x="1012.5" y="184" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#1f63d3">Grounded Response</text>
    <text x="1012.5" y="214" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#182233">Clinician or patient</text>
    <text x="1012.5" y="239" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#697483">answer with evidence,</text>
    <text x="1012.5" y="261" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#697483">eligibility, and caveats</text>
  </g>

  <path d="M255 218 H322" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M515 218 H582" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M820 218 H887" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <rect x="370" y="338" width="460" height="38" rx="19" fill="#101827"/>
  <text x="600" y="362" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#ffffff">Multi-turn context is carried forward across all stages</text>
</svg>
